services:
  # React Frontend (Served as Web Service to avoid Blueprint issues)
  - type: web
    name: primecode-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false # User will provide this in Render Dashboard
      - key: TURSO_AUTH_TOKEN
        sync: false # User will provide this in Render Dashboard
